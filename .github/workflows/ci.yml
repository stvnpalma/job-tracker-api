name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: jobtracker_user
          POSTGRES_PASSWORD: jobtracker_pass
          POSTGRES_DB: jobtracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: ./node_modules/.bin/prisma generate
        env:
          DATABASE_URL: postgresql://jobtracker_user:jobtracker_pass@localhost:5432/jobtracker

      - name: Run database migrations
        run: ./node_modules/.bin/prisma migrate deploy
        env:
          DATABASE_URL: postgresql://jobtracker_user:jobtracker_pass@localhost:5432/jobtracker

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://jobtracker_user:jobtracker_pass@localhost:5432/jobtracker
          NODE_ENV: test
